<h2>Search Posts</h2>

<input type="text" [(ngModel)]="searchText" placeholder="Search here...">
<button (click)="onSearch()" [disabled]="isLoading">Search</button>

@if (isLoading) {
  <div>
    <p>Loading...</p>
  </div>
}

@for (post of results; track post.id) {
  <div>
    <h3>{{ post.title }}</h3>
    <p>{{ post.body }}</p>
    <hr>
  </div>
}

@if (results.length === 0 && searchText) {
  <div>
    <p>No results found</p>
  </div>
}
